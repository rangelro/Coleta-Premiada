# ═══════════════════════════════════════════════════════════════════════════════
#  Alertas centralizados em ../coleta-observability/monitoring/alerts.yml
#
#  Este arquivo é mantido para referência local e smoke tests.
#  O arquivo canônico com todos os alertas (PostgreSQL + MongoDB + Frontend)
#  está em ../coleta-observability/monitoring/alerts.yml e é carregado pelo
#  Prometheus central.
# ═══════════════════════════════════════════════════════════════════════════════

groups:
  - name: coleta_premiada_local
    interval: 30s
    rules:
      - alert: PGConnectionsHigh
        expr: >
          sum(pg_stat_database_numbackends{datname!~"template.*|postgres"})
          / pg_settings_max_connections > 0.8
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Conexões PostgreSQL acima de 80%"
          description: "Uso de conexões em {{ $value | humanizePercentage }} do limite max_connections."
