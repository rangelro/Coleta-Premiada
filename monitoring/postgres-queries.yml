pg_coletas_recentes:
  query: |
    SELECT COUNT(*) AS total
    FROM collection_registrocoleta
    WHERE data_hora_coleta >= NOW() - INTERVAL '1 hour'
  master: true
  metrics:
    - total:
        usage: "GAUGE"
        description: "Total de coletas registradas na última hora"

pg_long_running_queries:
  query: |
    SELECT COUNT(*) AS count
    FROM pg_stat_activity
    WHERE state = 'active'
      AND now() - query_start > interval '5 seconds'
      AND query NOT ILIKE '%pg_stat_activity%'
  master: true
  metrics:
    - count:
        usage: "GAUGE"
        description: "Queries ativas com duração superior a 5 segundos"
