global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alertmanager não configurado: alertas disparam na UI (/alerts) mas não enviam notificações.
# Para habilitar notificações, adicione um serviço alertmanager no docker-compose.monitoring.yml
# e descomente a seção abaixo:
#
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres_exporter:9187']

  - job_name: 'node'
    static_configs:
      - targets: ['node_exporter:9100']

  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq:15692']

  - job_name: 'django-core'
    static_configs:
      - targets: ['core:8000']
    metrics_path: '/metrics'
