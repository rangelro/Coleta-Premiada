# ═══════════════════════════════════════════════════════════════════════════════
#  Coleta Premiada — docker-compose.yml  (base / produção)
#
#  Desenvolvimento:
#    docker compose up                   → aplica o override automaticamente
#    docker compose -f docker-compose.yml -f docker-compose.override.yml up
#
#  Produção:
#    docker compose -f docker-compose.yml up
# ═══════════════════════════════════════════════════════════════════════════════

services:

  # ─── CORE ────────────────────────────────────────────────────────────────

  core-db:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command: postgres -c shared_preload_libraries=pg_stat_statements -c pg_stat_statements.track=all
    volumes:
      - core-db-data:/var/lib/postgresql/data
      - ./monitoring/postgres-init:/docker-entrypoint-initdb.d:ro
    networks:
      - core-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  core:
    build:
      context: ./core
      target: production
    env_file: .env
    environment:
      POSTGRES_HOST: core-db
      POSTGRES_PORT: "5432"
      RABBITMQ_HOST: rabbitmq
      MINIO_ENDPOINT: minio:9000
      DEBUG: "false"
    ports:
      - "8001:8000"
    depends_on:
      core-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      core-network: {}
      storage-network: {}
      messaging-network: {}
      coleta-observability:
        aliases:
          - core
      coleta-shared:
        aliases:
          - core
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('127.0.0.1',8000),3)\" 2>/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M

  core-celery:
    build:
      context: ./core
      target: production
    env_file: .env
    environment:
      POSTGRES_HOST: core-db
      POSTGRES_PORT: "5432"
      RABBITMQ_HOST: rabbitmq
      DEBUG: "false"
    command: celery -A config worker --loglevel=info --concurrency=2
    depends_on:
      core-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - core-network
      - messaging-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M

  core-celery-beat:
    build:
      context: ./core
      target: production
    env_file: .env
    environment:
      POSTGRES_HOST: core-db
      POSTGRES_PORT: "5432"
      RABBITMQ_HOST: rabbitmq
      DEBUG: "false"
    command: celery -A config beat --loglevel=info
    depends_on:
      core-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - core-network
      - messaging-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 64M

  # Manutencao automatizada do PostgreSQL:
  # - cleanup_logs: diario as 02:15
  # - vacuum_analyze: diario as 02:45
  # - reindex: semanal aos domingos as 03:30
  postgres-maintenance:
    image: postgres:16-alpine
    env_file: .env
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGHOST: core-db
      PGPORT: "5432"
      PGUSER: ${POSTGRES_USER}
      PGDATABASE: ${POSTGRES_DB}
      LOG_RETENTION_DAYS: "90"
      LOG_CLEANUP_BATCH_SIZE: "5000"
    volumes:
      - ./scripts/maintenance:/maintenance:ro
    command: sh /maintenance/postgres_cron.sh
    depends_on:
      core-db:
        condition: service_healthy
    networks:
      - core-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 64M

  # Manutencao automatizada dos logs do MongoDB externo (ms-db).
  # Este repositorio nao define o servico Mongo; o script usa a rede compartilhada.
  mongo-maintenance:
    image: mongo:7
    env_file: .env
    environment:
      MONGO_HOST: ms-db
      MONGO_PORT: "27017"
      MONGO_DB: ${MONGO_INITDB_DATABASE:-coleta_db}
      MONGO_AUTH_DB: admin
      MONGO_LOG_COLLECTION: audit_logs
      MONGO_LOG_DATE_FIELD: created_at
      LOG_RETENTION_DAYS: "90"
    volumes:
      - ./scripts/maintenance:/maintenance:ro
    command: >
      bash -c "while true; do sh /maintenance/cleanup_mongo_logs.sh; sleep 86400; done"
    networks:
      - coleta-shared
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 64M

  core-consumer:
    build:
      context: ./core
      target: production
    env_file: .env
    environment:
      POSTGRES_HOST: core-db
      POSTGRES_PORT: "5432"
      RABBITMQ_HOST: rabbitmq
      DEBUG: "false"
    command: python manage.py consume_queue
    depends_on:
      core-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - core-network
      - messaging-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M

  # ─── STORAGE ──────────────────────────────────────────────────────────────

  minio:
    image: minio/minio:latest
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - storage-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  # ─── MESSAGING ────────────────────────────────────────────────────────────

  rabbitmq:
    image: rabbitmq:3-management-alpine
    env_file: .env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5672:5672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./monitoring/rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    networks:
      messaging-network: {}
      coleta-observability:
        aliases:
          - rabbitmq
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  # ─── OBSERVABILIDADE ──────────────────────────────────────────────────────
  # Prometheus e Grafana ficam em coleta-observability (../coleta-observability).
  # Exporters ficam aqui pois precisam acessar core-db pela rede interna.

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    env_file: .env
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@core-db:5432/${POSTGRES_DB}?sslmode=disable"
      PG_EXPORTER_EXTEND_QUERY_PATH: /etc/postgres-exporter/queries.yml
    volumes:
      - ./monitoring/postgres-queries.yml:/etc/postgres-exporter/queries.yml:ro
    depends_on:
      core-db:
        condition: service_healthy
    networks:
      core-network: {}
      coleta-observability:
        aliases:
          - postgres-exporter
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M
        reservations:
          cpus: "0.05"
          memory: 32M

  # ─── BACKUP ───────────────────────────────────────────────────────────────

  backup-core:
    image: postgres:16-alpine
    env_file: .env
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGHOST: core-db
      PGUSER: ${POSTGRES_USER}
      PGDATABASE: ${POSTGRES_DB}
    volumes:
      - backup-data:/backups
      - ./scripts/backup-core.sh:/backup.sh:ro
    command: sh /backup.sh
    depends_on:
      core-db:
        condition: service_healthy
    networks:
      - core-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 64M


# ─── VOLUMES ──────────────────────────────────────────────────────────────────

volumes:
  core-db-data:
  rabbitmq-data:
  minio-data:
  backup-data:

# ─── NETWORKS ─────────────────────────────────────────────────────────────────
#
#  core-network          — core-db, core, core-celery*, core-consumer
#  storage-network       — minio (acessado por core)
#  messaging-network     — rabbitmq + todos os produtores/consumidores
#  coleta-observability  — rede externa criada por ../coleta-observability

networks:
  core-network:
    driver: bridge
  storage-network:
    driver: bridge
  messaging-network:
    driver: bridge
  coleta-observability:
    external: true
    name: coleta-observability
  coleta-shared:
    name: coleta-shared
    driver: bridge
