services:
  # Banco de dados do Monolito Core (Django)
  postgres:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Banco de dados do Microserviço de Coleta
  mongodb:
    image: mongo:7
    env_file: .env
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE}
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # Fila de mensagens assíncrona
  rabbitmq:
    image: rabbitmq:3-management-alpine
    env_file: .env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5672:5672" # porta da fila
      - "15672:15672" # painel de administração
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  # Armazenamento de fotos (espelha o S3 localmente)
  minio:
    image: minio/minio
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000" # API do MinIO
      - "9001:9001" # painel de administração
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  mongo_data:
  rabbitmq_data:
  minio_data:
